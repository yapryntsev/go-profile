get:
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    200:
      description: Image metadata for provided id
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/image-metadata.yaml'
    404:
      description: Image metadata for provided id not found
      content:
        application/json:
          schema:
            $ref: '../../components/schemas/not-found.yaml'