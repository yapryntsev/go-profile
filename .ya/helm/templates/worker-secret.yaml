{{- if .Values.worker.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "helm.fullname" . }}-worker
  labels:
    {{- include "helm.labels" . | nindent 4 }}
type: Opaque
data:
  APP_DB_CONNECT: {{ .Values.secret.APP_DB_CONNECT | b64enc | quote }}
  APP_S3_ACCESS_KEY_ID: {{ .Values.secret.APP_S3_ACCESS_KEY_ID | b64enc | quote }}
  APP_S3_SECRET_ACCESS_KEY: {{ .Values.secret.APP_S3_SECRET_ACCESS_KEY | b64enc | quote }}
{{- end }}
