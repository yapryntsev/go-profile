image:
  repository: goph-profile-app
  pullPolicy: IfNotPresent
  tag: "latest"

serviceAccount:
  create: true
  automount: false
  annotations: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  runAsGroup: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: goph-profile.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Replicas
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Replicas
          value: 2
          periodSeconds: 60

terminationGracePeriodSeconds: 30

lifecycle:
  preStopSleepSeconds: 5

env:
  ENV: prod
  APP_NAME: goph-profile
  APP_HTTP_ADDR: ":8080"
  APP_JWT_TTL: 1h
  APP_S3_ADDR: minio:9000
  APP_S3_BUCKET_NAME: goph-profile
  APP_KAFKA_ADDR: kafka:9092
  APP_KAFKA_TOPIC: resize
  OTEL_SERVICE_NAME: goph-profile
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_EXPORTER_OTLP_INSECURE: "true"

secret:
  APP_JWT_SECRET: ""
  APP_DB_CONNECT: ""
  APP_S3_ACCESS_KEY_ID: ""
  APP_S3_SECRET_ACCESS_KEY: ""

worker:
  enabled: true
  replicaCount: 1
  image:
    repository: goph-profile-worker
    pullPolicy: IfNotPresent
    tag: "latest"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  healthPort: 8081
  livenessProbe:
    httpGet:
      path: /healthz
      port: health
    initialDelaySeconds: 10
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /readyz
      port: health
    initialDelaySeconds: 5
    periodSeconds: 10

httpRoute:
  enabled: false

networkPolicy:
  enabled: true
  ingressNamespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: ingress-nginx
  monitoringNamespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: monitoring
  egressRules:
    db:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: postgres
    s3:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: minio
    kafka:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kafka
    otel:
      namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring

serviceMonitor:
  enabled: true
  interval: 30s
  path: /metrics
